<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0" />
        <title>Siran</title>

        <link
            rel="stylesheet"
            href="public/assets/styles/styles.css" />
    </head>
    <body>
        <!-- Navbar -->
        <header class="navbar">
            <img
                src="public/assets/img/Logo.png"
                class="logo"
                alt="Siran Logo" />
            <button
                class="hamburger"
                id="hamburger"
                aria-label="Abrir menú">
                ☰
            </button>
            <div
                class="nav-container"
                id="nav-container">
                <nav class="nav_links">
                    <ul>
                        <li><a href="#home">Home</a></li>
                        <li><a href="#beneficios">Beneficios</a></li>
                        <li><a href="#testimonios">Testimonios</a></li>
                        <li><a href="#planes">Planes</a></li>
                    </ul>
                </nav>
                <button class="btn">Empezar</button>
            </div>
        </header>

        <!-- Hero -->
         <section
                class="hero"
                id="home">
            <div class="hero-text">
                <h1>Cuida a tu bebé incluso cuando no puedes verlo</h1>
                <p>
                    SIRAN monitorea la salud de tu bebé en tiempo real y te alerta ante cualquier cambio importante,
                    ayudándote a actuar rápido y con tranquilidad.
                </p>
                <button class="hero-btn">Prueba Demo</button>
            </div>
            <div class="hero-img">
                <img
                        src="public/assets/img/FotoHero.png"
                        alt="Doctora con bebé" />
             </div>
         </section>
        <script src="public/assets/script/app.js"></script>
    </body>
</html>
